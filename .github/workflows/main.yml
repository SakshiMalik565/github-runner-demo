name: GitHub Hosted Runner Demo

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  run-python-job:
    runs-on: windows-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Show runner operating system
        run: systeminfo

      - name: Check Python version
        run: python --version

      - name: Run Python file
        run: python app.py